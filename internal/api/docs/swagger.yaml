basePath: /
definitions:
  main.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  main.GroupListResponse:
    properties:
      groups:
        items:
          $ref: '#/definitions/model.Group'
        type: array
    type: object
  main.createGroupRequest:
    properties:
      name:
        type: string
    type: object
  model.Group:
    properties:
      instances:
        items:
          $ref: '#/definitions/model.Instance'
        type: array
      string:
        type: string
    type: object
  model.Instance:
    properties:
      cpu:
        type: integer
      gpu:
        type: boolean
      id:
        type: string
      provider:
        type: string
      ram:
        type: integer
      status:
        type: string
    type: object
info:
  contact: {}
  description: Demo API for multi-cloud Group and Instance orchestration.
  title: Orchestrator API
  version: "1.0"
paths:
  /groups:
    get:
      description: Returns all Groups.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.GroupListResponse'
      summary: List groups
      tags:
      - groups
    post:
      consumes:
      - application/json
      description: Creates a new Group (namespace in k3s + project in OpenStack).
        Rolls back on partial failure.
      parameters:
      - description: Group payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.createGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Group'
        "400":
          description: Invalid or missing name
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "409":
          description: Group already exists
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "502":
          description: Cloud provider error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create a group
      tags:
      - groups
  /groups/{name}:
    get:
      description: Returns one Group by its name, including its instances.
      parameters:
      - description: Group name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Group'
        "404":
          description: Group not found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Get group by name
      tags:
      - groups
swagger: "2.0"
